<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>루이스바 시우실장</title>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#080808;
  color:#eee;
}

.topBar{
  height:76px;
  background:#0d0d0d;
  color:#d6ad62;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 28px;
  border-bottom:1px solid rgba(214,173,98,.25);
  position:sticky;
  top:0;
  z-index:20;
}

.logo{
  font-size:28px;
  letter-spacing:5px;
  font-weight:bold;
}

.adminOpenBtn{
  background:transparent;
  color:#d6ad62;
  border:1px solid #d6ad62;
  padding:10px 15px;
  border-radius:10px;
  cursor:pointer;
  font-size:14px;
  font-weight:bold;
}

.hero{
  width:100%;
  height:520px;
  background:#080808 url("banner.png") center center / cover no-repeat;
}

section{
  max-width:1000px;
  margin:24px auto;
  background:#141414;
  color:#eee;
  padding:24px;
  border-radius:18px;
  box-shadow:0 8px 28px rgba(0,0,0,.45);
  border:1px solid rgba(255,255,255,.06);
}

.noticeBar{
  background:#101010;
  color:white;
  display:flex;
  gap:18px;
  align-items:center;
  font-size:18px;
  border:1px solid rgba(214,173,98,.35);
}

.noticeTitle{
  color:#d6ad62;
  font-weight:bold;
  white-space:nowrap;
}

#comment{
  white-space:pre-line;
  line-height:1.7;
  font-weight:600;
}

.photoBox{
  padding:0;
  overflow:hidden;
  position:relative;
  background:#0d0d0d;
}

.slider{
  width:100%;
  height:520px;
  position:relative;
  background:#000;
  overflow:hidden;
}

.slideImg{
  width:100%;
  height:100%;
  object-fit:cover;
  display:none;
}

.slideImg.active{
  display:block;
}

.slideBtn{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  background:rgba(0,0,0,.58);
  color:white;
  border:1px solid rgba(214,173,98,.35);
  width:46px;
  height:46px;
  border-radius:50%;
  cursor:pointer;
  font-size:26px;
  z-index:5;
}

.prevBtn{left:14px}
.nextBtn{right:14px}

.dots{
  position:absolute;
  bottom:16px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:8px;
  z-index:5;
}

.dot{
  width:9px;
  height:9px;
  background:rgba(255,255,255,.55);
  border-radius:50%;
  cursor:pointer;
}

.dot.active{
  background:#d6ad62;
}

.infoGrid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:14px;
}

.infoCard{
  text-align:center;
  padding:22px;
  border-right:1px solid rgba(255,255,255,.12);
  color:#eee;
}

.infoCard:last-child{
  border-right:none;
}

.infoCard h3{
  color:#d6ad62;
}

label{
  display:block;
  margin:12px 0;
}

input[type=number]{
  width:100px;
  padding:10px;
  margin-left:8px;
  font-size:16px;
  background:#222;
  color:#fff;
  border:1px solid #444;
  border-radius:8px;
}

.category{margin-top:20px}

.category h3{
  background:#000;
  color:#d6ad62;
  padding:14px;
  border-radius:10px;
  font-size:18px;
  border:1px solid rgba(214,173,98,.2);
}

.menuItem{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  background:#202020;
  color:#eee;
  margin:7px 0;
  padding:12px;
  border-radius:10px;
  border:1px solid rgba(255,255,255,.06);
}

.menuItem span{
  flex:1;
  line-height:1.4;
}

.result{
  background:#000;
  color:white;
  padding:20px;
  border-radius:14px;
  margin-top:25px;
  border:1px solid rgba(214,173,98,.25);
}

.result h2{color:#ffd36a}

#resetBtn{
  margin-top:20px;
  width:100%;
  padding:15px;
  background:#d32f2f;
  color:#fff;
  border:none;
  border-radius:12px;
  font-size:18px;
  cursor:pointer;
  font-weight:bold;
}

.modalBg{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.65);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:999;
  padding:20px;
}

.modal{
  background:#151515;
  color:#eee;
  width:100%;
  max-width:460px;
  border-radius:18px;
  padding:24px;
  border:1px solid rgba(214,173,98,.35);
  box-shadow:0 20px 60px rgba(0,0,0,.6);
}

.modal h2{
  margin-top:0;
  color:#d6ad62;
}

.adminInput,
.adminTextarea{
  width:100%;
  padding:12px;
  margin-top:8px;
  border:1px solid #444;
  border-radius:10px;
  font-size:16px;
  background:#222;
  color:white;
}

.adminTextarea{
  height:130px;
  resize:vertical;
}

.modalBtns{
  display:flex;
  gap:10px;
  margin-top:14px;
}

.modalBtns button{
  flex:1;
  padding:13px;
  border:none;
  border-radius:10px;
  font-size:16px;
  cursor:pointer;
  font-weight:bold;
}

#saveMemoBtn{
  background:#d6ad62;
  color:#111;
}

#closeModalBtn{
  background:#333;
  color:#eee;
}

@media (max-width:700px){
  .topBar{
    height:64px;
    padding:0 14px;
  }

  .logo{
    font-size:21px;
    letter-spacing:3px;
  }

  .adminOpenBtn{
    padding:8px 11px;
    font-size:12px;
  }

  .hero{
    height:240px;
    background-size:contain;
    background-position:center center;
    background-repeat:no-repeat;
    background-color:#080808;
  }

  section{
    margin:14px 10px;
    padding:18px;
  }

  .noticeBar{
    font-size:16px;
    flex-direction:column;
    align-items:flex-start;
  }

  .slider{
    height:330px;
  }

  .slideBtn{
    width:38px;
    height:38px;
    font-size:22px;
  }

  .infoGrid{
    grid-template-columns:1fr;
  }

  .infoCard{
    border-right:none;
    border-bottom:1px solid rgba(255,255,255,.12);
  }

  .infoCard:last-child{
    border-bottom:none;
  }

  input[type=number]{
    width:100%;
    margin:8px 0 0;
  }

  .menuItem{
    flex-direction:column;
    align-items:flex-start;
  }

  .menuItem input{
    width:100%;
  }
}
</style>
</head>

<body>

<div class="topBar">
  <div class="logo">LOUIS BAR</div>
  <button class="adminOpenBtn" id="openModalBtn">⚙ 공지 수정</button>
</div>

<header class="hero"></header>

<section class="noticeBar">
  <div class="noticeTitle">📢 실시간 안내</div>
  <div id="comment">등록된 안내가 없습니다.</div>
</section>

<section class="photoBox">
  <div class="slider" id="slider">
    <button class="slideBtn prevBtn" id="prevBtn">‹</button>
    <button class="slideBtn nextBtn" id="nextBtn">›</button>
    <div class="dots" id="dots"></div>
  </div>
</section>


<section style="display:flex;gap:15px;justify-content:center;flex-wrap:wrap;">
  <a href="https://open.kakao.com/o/sKo00TBi" target="_blank"
     style="background:#FEE500;color:#111;text-decoration:none;padding:16px 28px;
     border-radius:12px;font-weight:bold;font-size:18px;">
     💬 카카오톡 문의
  </a>

  <a href="tel:01031982328"
     style="background:#d6ad62;color:#111;text-decoration:none;padding:16px 28px;
     border-radius:12px;font-weight:bold;font-size:18px;">
     📞 전화 문의
  </a>
</section>


<section>
  <div class="infoGrid">
    <div class="infoCard">
      <h3>이용 안내</h3>
      <p>프라이빗 초이스 착석 바<br>주대 : 사이트 하단 계산기 확인</p>
    </div>
    <div class="infoCard">
      <h3>주류 안내</h3>
      <p>위스키 5만원부터<br>맥주 5천원부터</p>
    </div>
    <div class="infoCard">
      <h3>위치 안내</h3>
      <p>선릉역 10번 출구 도보5분<br>테헤란로 421</p>
    </div>
  </div>
</section>

<section>
  <h2>주대 계산기</h2>

  <label>
    이용 타임 / 1타임 50분
    <input type="number" id="times" min="1" value="1">
  </label>

  <label>
    파트너 인원
    <input type="number" id="partnerCount" min="0" value="1">
  </label>

  <p>파트너 TCB: 1명당 65,000원</p>
  <p>테이블 TCB: 1타임당 62,000원</p>

  <label>
    <input type="checkbox" id="cardPay">
    카드 결제 / 부가세 18%
  </label>

  <button id="resetBtn" onclick="resetCalculator()">초기화</button>

  <div id="menuArea"></div>

  <div class="result">
    <p>파트너 TCB: <b id="partnerTotal">0원</b></p>
    <p>테이블 TCB: <b id="tableTotal">0원</b></p>
    <p>메뉴 금액: <b id="menuTotal">0원</b></p>
    <p>부가세: <b id="taxTotal">0원</b></p>
    <h2>총 금액: <span id="grandTotal">0원</span></h2>
  </div>
</section>

<div class="modalBg" id="modalBg">
  <div class="modal">
    <h2>공지 수정</h2>

    <label>
      관리자 비밀번호
      <input type="password" id="adminPw" class="adminInput" placeholder="비밀번호 입력">
    </label>

    <label>
      안내 내용
      <textarea id="adminMemo" class="adminTextarea" placeholder="예: 오늘 8시부터 예약 가능합니다."></textarea>
    </label>

    <div class="modalBtns">
      <button id="closeModalBtn">닫기</button>
      <button id="saveMemoBtn">저장</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBeur4mZc8egIhLbz3OJxYhhsYRZbdjMv4",
  authDomain: "luois-c3e5d.firebaseapp.com",
  databaseURL: "https://luois-c3e5d-default-rtdb.firebaseio.com",
  projectId: "luois-c3e5d",
  storageBucket: "luois-c3e5d.firebasestorage.app",
  messagingSenderId: "274383238758",
  appId: "1:274383238758:web:fdc7ad7f62c3671b72dfa7"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const ADMIN_PASSWORD = "4699";

const commentBox = document.getElementById("comment");
const adminMemo = document.getElementById("adminMemo");
const saveMemoBtn = document.getElementById("saveMemoBtn");
const modalBg = document.getElementById("modalBg");

const commentRef = ref(db, "liveMemo/comment");

onValue(commentRef, snapshot => {
  const text = snapshot.val();
  commentBox.innerText = text || "등록된 안내가 없습니다.";
  if(text) adminMemo.value = text;
});

document.getElementById("openModalBtn").onclick = () => modalBg.style.display = "flex";
document.getElementById("closeModalBtn").onclick = () => modalBg.style.display = "none";

modalBg.addEventListener("click", e => {
  if(e.target === modalBg) modalBg.style.display = "none";
});

saveMemoBtn.addEventListener("click", async () => {
  const pw = document.getElementById("adminPw").value;
  const memo = adminMemo.value.trim();

  if(pw !== ADMIN_PASSWORD){
    alert("관리자 비밀번호가 틀렸습니다.");
    return;
  }

  if(!memo){
    alert("안내 내용을 입력해주세요.");
    return;
  }

  await set(commentRef, memo);
  alert("실시간 안내가 저장되었습니다.");
  modalBg.style.display = "none";
});

/* 사진은 photo1.jpg ~ photo10.jpg까지 사용 */
const photoList = [
  "photo1.jpg",
  "photo2.jpg",
  "photo3.jpg",
  "photo4.jpg",
  "photo5.jpg",
  "photo6.jpg",
  "photo7.jpg",
  "photo8.jpg",
  "photo9.jpg",
  "photo10.jpg"
];

const slider = document.getElementById("slider");
const dotsBox = document.getElementById("dots");
let slides = [];
let slideIndex = 0;

photoList.forEach((src, index) => {
  const img = document.createElement("img");
  img.src = src;
  img.className = "slideImg";
  img.onerror = function(){
    this.remove();
    refreshSlides();
  };

  if(index === 0) img.classList.add("active");

  slider.insertBefore(img, dotsBox);
});

function refreshSlides(){
  slides = Array.from(document.querySelectorAll(".slideImg"));

  if(slides.length === 0){
    const img = document.createElement("img");
    img.src = "banner.png";
    img.className = "slideImg active";
    slider.insertBefore(img, dotsBox);
    slides = [img];
  }

  if(slideIndex >= slides.length) slideIndex = 0;

  dotsBox.innerHTML = "";
  slides.forEach((_, i) => {
    const dot = document.createElement("div");
    dot.className = "dot";
    if(i === slideIndex) dot.classList.add("active");
    dot.onclick = () => showSlide(i);
    dotsBox.appendChild(dot);
  });

  showSlide(slideIndex);
}

function showSlide(index){
  if(slides.length === 0) return;

  if(index < 0) index = slides.length - 1;
  if(index >= slides.length) index = 0;

  slides.forEach(img => img.classList.remove("active"));
  document.querySelectorAll(".dot").forEach(dot => dot.classList.remove("active"));

  slideIndex = index;
  slides[slideIndex].classList.add("active");

  const dots = document.querySelectorAll(".dot");
  if(dots[slideIndex]) dots[slideIndex].classList.add("active");
}

document.getElementById("prevBtn").onclick = () => showSlide(slideIndex - 1);
document.getElementById("nextBtn").onclick = () => showSlide(slideIndex + 1);

setTimeout(refreshSlides, 700);

setInterval(() => {
  showSlide(slideIndex + 1);
}, 5000);

/* 모바일 손가락 슬라이드 */
let touchStartX = 0;

slider.addEventListener("touchstart", e => {
  touchStartX = e.touches[0].clientX;
});

slider.addEventListener("touchend", e => {
  const touchEndX = e.changedTouches[0].clientX;
  const diff = touchStartX - touchEndX;

  if(diff > 50) showSlide(slideIndex + 1);
  if(diff < -50) showSlide(slideIndex - 1);
});

/* 메뉴 데이터 */
const menus = {
  "양주": [
    ["글렌 데일리저브",50000],["임페리얼 12년",60000],["윈저아이스",60000],
    ["스카치블루",60000],["골든블루 사피루스",70000],["임페리얼 17년",100000],
    ["스카치블루 17년",100000],["골든블루 다이아",110000],["글렌피딕 12년",170000],
    ["글렌피딕 15년",210000],["조니 블랙",140000],["조니 블루",320000],
    ["글렌도워 12년 몰트",230000],["싱글톤 더프타운 12년",230000],
    ["발렌타인 마스터즈",140000],["잭다니엘",150000],
    ["발렌타인 17년",220000],["발렌타인 21년",290000],
    ["로얄살루트 21년",300000],["로얄 21년 몰트",310000]
  ],
  "맥주": [
    ["테라",5000],["카프리",6000],["호가든",7000],["코로나",8000],
    ["하이네켄",8000],["아사히",8000],["기네스",9000]
  ],
  "보드카 / 리큐르": [
    ["핸드릭스",170000],["스미노프",140000],["앱솔루트",140000],
    ["예거마이스터",150000],["아그와",160000]
  ],
  "와인": [
    ["헨켈",120000],["산타 덕 꼬뜨 뒤론",120000],["빌라엠",120000],
    ["무똥까데",120000],["1865",120000]
  ],
  "소주": [
    ["소주",15000]
  ],
  "안주": [
    ["과일",20000],["스팸후라이",15000],["황도",15000],["육포한치",15000],
    ["오징어땅콩",15000],["견과류",15000],["먹태",15000]
  ]
};

const menuArea = document.getElementById("menuArea");

Object.keys(menus).forEach(category => {
  const box = document.createElement("div");
  box.className = "category";
  box.innerHTML = `<h3>${category}</h3>`;

  menus[category].forEach(([name, price]) => {
    box.innerHTML += `
      <label class="menuItem">
        <span>${name} / ${price.toLocaleString()}원</span>
        수량 <input type="number" class="menuQty" min="0" value="0" data-price="${price}">
      </label>
    `;
  });

  menuArea.appendChild(box);
});

function won(num){
  return Math.round(num).toLocaleString("ko-KR") + "원";
}

function calculateTotal(){
  const times = Number(document.getElementById("times").value) || 1;
  const partnerCount = Number(document.getElementById("partnerCount").value) || 0;

  const partnerTotal = times * partnerCount * 65000;
  const tableTotal = times * 62000;

  let menuTotal = 0;
  document.querySelectorAll(".menuQty").forEach(input => {
    const qty = Number(input.value) || 0;
    const price = Number(input.dataset.price);
    menuTotal += qty * price;
  });

  const beforeTax = partnerTotal + tableTotal + menuTotal;
  const tax = document.getElementById("cardPay").checked ? Math.round(beforeTax * 0.18) : 0;
  const grandTotal = beforeTax + tax;

  document.getElementById("partnerTotal").textContent = won(partnerTotal);
  document.getElementById("tableTotal").textContent = won(tableTotal);
  document.getElementById("menuTotal").textContent = won(menuTotal);
  document.getElementById("taxTotal").textContent = won(tax);
  document.getElementById("grandTotal").textContent = won(grandTotal);
}

window.resetCalculator = function(){
  document.getElementById("times").value = 1;
  document.getElementById("partnerCount").value = 1;
  document.getElementById("cardPay").checked = false;

  document.querySelectorAll(".menuQty").forEach(input => {
    input.value = 0;
  });

  calculateTotal();
}

document.addEventListener("input", calculateTotal);
document.addEventListener("change", calculateTotal);
calculateTotal();
</script>

</body>
</html>
